<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>حماية الحاسوب من الفيروسات | مدرسة مدينة الشامخة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --navy: #0D1B2A;
    --white: #F8F6F0;
  }
  body {
    font-family: 'Cairo', sans-serif;
    background: var(--navy);
    color: var(--white);
    margin: 0;
    overflow-x: hidden;
    direction: rtl;
  }

  /* الشاشة الافتتاحية */
  #hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    padding: 20px;
    background: radial-gradient(circle at center, #152238 0%, #0D1B2A 100%);
  }

  /* شاشة اللعبة (مخفية في البداية) */
  #app {
    display: none; 
    padding: 40px 20px;
    max-width: 1000px;
    margin: 0 auto;
  }

  .btn-start {
    background: var(--gold);
    color: var(--navy);
    padding: 18px 50px;
    border-radius: 50px;
    font-size: 1.5rem;
    font-weight: bold;
    border: none;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    transition: 0.3s;
  }
  .btn-start:hover { transform: scale(1.05); background: #e8c97a; }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-top: 30px;
  }

  .card {
    background: #152238;
    border: 1px solid var(--gold);
    border-radius: 15px;
    padding: 30px;
    text-align: center;
    cursor: pointer;
    transition: 0.4s;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .card:hover { transform: translateY(-10px); background: #1E3050; }

  .card-icon { font-size: 3rem; margin-bottom: 15px; }
  .card-title { font-weight: bold; color: var(--gold); font-size: 1.2rem; }
  .card-desc { margin-top: 10px; font-size: 1rem; line-height: 1.6; display: none; }
  
  .card.active .card-desc { display: block; }
  .card.active .card-title { font-size: 1.4rem; }
  .card.active .card-icon { display: none; }

  .progress-container { margin-bottom: 30px; text-align: center; }
  .progress-bar { background: rgba(255,255,255,0.1); height: 10px; border-radius: 5px; margin-top: 10px; }
  .progress-fill { background: var(--gold); height: 100%; width: 0%; transition: 0.5s; border-radius: 5px; }
</style>
</head>
<body>

  <section id="hero">
    <h1 style="font-size: 3rem; margin-bottom: 10px;">🛡️ درع الشامخة الرقمي</h1>
    <p style="font-size: 1.2rem; margin-bottom: 30px; opacity: 0.8;">تعلم أساسيات حماية الحاسوب بطريقة تفاعلية</p>
    <button class="btn-start" onclick="startApp()">ابدأ اللعب الآن</button>
  </section>

  <main id="app">
    <div class="progress-container">
      <h3>التقدم: <span id="count">0</span> / 6</h3>
      <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
    </div>

    <div class="cards-grid" id="cards-container"></div>
  </main>

<script>
  const CARDS_DATA = [
    { icon: '🔒', title: 'كلمات المرور', desc: 'اجعلها طويلة، معقدة، ولا تشاركها مع أحد أبداً!' },
    { icon: '🔍', title: 'التحديثات', desc: 'تحديث نظام التشغيل والبرامج يغلق الثغرات التي يستغلها المخترقون.' },
    { icon: '🚫', title: 'الروابط المشبوهة', desc: 'لا تضغط على رابط يصلك من شخص مجهول، فقد يكون فخاً.' },
    { icon: '💾', title: 'النسخ الاحتياطي', desc: 'احتفظ بنسخة من ملفاتك الهامة بعيداً عن جهازك الأساسي.' },
    { icon: '🛡️', title: 'مكافح الفيروسات', desc: 'تأكد من وجود برنامج حماية نشط ومحدث دائماً على جهازك.' },
    { icon: '📲', title: 'التحقق الثنائي', desc: 'استخدم بصمة الإصبع أو رمز الهاتف كطبقة حماية إضافية.' }
  ];

  let learned = new Set();

  function startApp() {
    // إخفاء شاشة البداية
    document.getElementById('hero').style.display = 'none';
    // إظهار شاشة اللعبة
    document.getElementById('app').style.display = 'block';
    renderCards();
  }

  function renderCards() {
    const container = document.getElementById('cards-container');
    container.innerHTML = CARDS_DATA.map((card, index) => `
      <div class="card" id="card-${index}" onclick="toggleCard(${index})">
        <div class="card-icon">${card.icon}</div>
        <div class="card-title">${card.title}</div>
        <div class="card-desc">${card.desc}</div>
      </div>
    `).join('');
  }

  function toggleCard(index) {
    const cardElement = document.getElementById(`card-${index}`);
    cardElement.classList.toggle('active');
    
    if (!learned.has(index)) {
      learned.add(index);
      updateProgress();
    }
  }

  function updateProgress() {
    const total = CARDS_DATA.length;
    const current = learned.size;
    const percent = (current / total) * 100;
    
    document.getElementById('count').textContent = current;
    document.getElementById('progress-fill').style.width = percent + '%';

    if (current === total) {
      setTimeout(() => alert('🎉 مبروك! لقد تعلمت كل مهارات الحماية!'), 500);
    }
  }
</script>

</body>
</html>
